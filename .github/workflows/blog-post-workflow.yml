name: Latest blog post workflow
on:
  schedule:
    # Runs every day at 8:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:  # lets you trigger it manually to test

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pull latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://marktruong.dev/feed.xml"
          max_post_count: 5
          commit_message: "chore: update latest blog posts"
